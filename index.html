<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Save Our Wildlife - A conservation organization promotional video">
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container" role="main">
    <header>
      <h1 id="page-title">Save Our Wildlife</h1>
    </header>

    <section class="video-section" aria-labelledby="page-title">
      <div id="video-wrapper" class="video-wrapper">
        <video
          id="wildlife-video"
          class="wildlife-video"
          controls
          preload="metadata"
          aria-label="Wildlife conservation promotional video"
        >
          <source src="wildlife.mp4" type="video/mp4">
          <p>Your browser does not support HTML5 video. Please download the
            <a href="wildlife.mp4">wildlife video</a>.
          </p>
        </video>
      </div>

      <p class="description" id="video-description">
        Join our mission to protect endangered species and preserve natural habitats
        for future generations. Every action counts in safeguarding our planet's wildlife.
      </p>

      <button
        type="button"
        id="toggle-btn"
        class="toggle-btn"
        aria-controls="video-wrapper"
        aria-expanded="true"
      >
        Hide Video
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
